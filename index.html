<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haks login</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="stylesheet" href="fontawesome/css/all.css">
</head>
<body>
    <div class="div1">
        <i class="fa fa-arrow-left"></i>
        <input type="text" class="ppp username" placeholder="Username or Email" required>
        <input type="password" class="ppp password" placeholder="Password" required><br>
        <br><br><br><br><br>
        <button class="ppp">LOGIN</button>
        <br><br><br><br><br>
        <a href="#">
        <p>Forgot password?</p>
        <p>Don't have an account?&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Sign Up</p>
        </a>
        <p class="lines"><span>OR</span></p>
        <p>Sign up with Social Networks</p>
        <a href="#" class="fa-brands fa-facebook"></a>
        <a href="#" class="fa-brands fa-google" ></a>
        <a href="#" class="fa-brands fa-twitter" ></a>
    </div>
    <div class="div2">
        <i class="fa fa-2 fa-arrow-left"></i>
        <input type="text" class="pppp username2" placeholder="Username or Email" required>
        <input type="password" class="pppp password2" placeholder="Password" required><br>
        <br><br><br><br><br>
        <button class=" button2 pppp">LOGIN</button>
        <br><br><br><br><br>
        <a href="#">
        <p class="p2">Forgot password?</p>
        <p class="p2">Don't have an account?&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Sign Up</p>
        </a>
        <p class="p2 lines2"><span>OR</span></p>
        <p class="p2">Sign up with Social Networks</p>
        <a href="#" class="fa-brands fa-facebook"></a>
        <a href="#" class="fa-brands fa-google" ></a>
        <a href="#" class="fa-brands fa-twitter" ></a>
    </div>
</body>
</html>
